<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>q3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <form class="contact-form">

            <div class="form-header">
                <h1>Contact Form</h1>
                <p>Get in touch with us</p>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" name="firstName">
                </div>

                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="lastName">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</la>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject">
                    <option>Select a topic</option>
                    <option>General Question</option>
                    <option>Support</option>
                    <option>Feedback</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Tell us how we can help..."></textarea>
            </div>

            <div class="preferences-section">
                <h3>Contact Preferences</h3>

                <div class="checkbox-row">
                    <label>
                    <input type="checkbox" name="preferences" value="email">
                    Email Updates
                    </label>

                    <label>
                    <input type="checkbox" name="preferences" value="phone">
                    Phone Follow-up
                    </label>

                    <label>
                    <input type="checkbox" name="preferences" value="newsletter">
                    Newsletter
                    </label>
                </div>
            </div>

            <div class="buttons-row">
                <button type="button" class="save-btn">Save Draft</button>
                <button type="submit" class="send-btn">Send Message</button>
            </div>

        </form>
    </div>
    
</body>
</html>
