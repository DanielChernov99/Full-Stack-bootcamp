<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>q1 exercise</title>
    <style>

        h1{
            text-align: center;
        }       
        .container{
            
            display: flex;
            height: 100px;
            width: 50%;
            margin:0 auto;
        }
        #firstSection{
            background-color: pink;
            width: calc(100% - 20px);

        }
        #secondSection{
            background-color: rgb(255, 46, 81);
            width: 20px;
        }
       
    </style>
</head>
<body>
    <h1>ex 1</h1>
    <div class="container">
        <section id="firstSection"></section>
        <section id="secondSection"></section>
    </div>
</body>
</html>
