<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
            position: relative;
            background-color: #0025f8;
            width: 30%;
            aspect-ratio: 1/1;
            margin-inline: auto;
        }
        .child{
            position: absolute;
            background-color: #ff0000;
        }
        #child-1{
            width: 5%;
            height: 100%;
            left:10%;
        }
        #child-2{
            width: 100%;
            height: 5%;
            top:10%;
        }
    </style>


</head>
<body>
    <div id="parent">
        <div class="child" id="child-1"></div>
        <div class="child" id="child-2"></div>
    </div>

</body>
</html>
