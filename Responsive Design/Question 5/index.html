<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-card-container">

        <div class="product-image-container">
            <img 
                src="" 
                alt="Premium Laptop"
                class="product-image"
            >
        </div>

        <div class="product-info-container">

            <h1 class="product-title">
                Premium Laptop
            </h1>

            <p class="product-description">
                High-performance laptop perfect for developers and designers.
                Features the latest processor, ample RAM, and a stunning display
                that brings your work to life.
            </p>

            <div class="product-bottom-row">
                <p class="product-price">
                    $1,299
                </p>

                <button class="product-button">
                    Add to Cart
                </button>
            </div>

        </div>

    </div>

</body>
</html>
