<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>q5 exercise</title>
    <style>
        body{
            background-color: #ECF0F1;
            font-family: sans-serif;
            margin: 0;
        }
        h1{
            text-align: center;
            color: #2980B9;
            padding: 10px;
            font-size: 42px;
            margin-bottom: 5px;
        }
        .form-container{
            box-sizing: border-box;
            width: 55%;
            margin: 0 auto;
            background-color: #FFFFFF;         
        } 
        .form-container fieldset{
            background-color: #ECF0F1;
            border: 2px solid #3F9DDD;
            border-radius: 8px;
            color: #3B4F63;
            font-weight: bolder;
            padding: 25px 18px;
            margin: 20px 10px 30px;
        }
        .form-container legend{
            background-color: white;
            color: #2980B9;
        }
        .form-container input{
            border-radius: 4px;
            border: 2px solid #D2D8DA;
        }
        .form-container radio{
            border-radius: 4px;
            border: 2px solid #D2D8DA;
        }
        .preference-cointainer select{
            margin: 10px;
        }
        .form-container #msg_box{
            font-size: 20px;
        } 
        button{
            border-radius: 5px;
            padding: 3%;
            color: #F4FAF6;
            margin: 5%;
            font-size: 100%;
        }
        #btnSendMessage{
            background-color: #25AF60;
        }
        #btnReset{
            background-color: #E74B3C;
        }

        

    </style>
</head>
<body>
    <h1>Contact Us</h1>
    <div class="form-container">
        <form>
            <fieldset class="personal-info-container">
                <legend>Personal Information</legend>  

                <label for="name">Name : </label>
                <input 
                    type="text" 
                    id="name_input" 
                    name="name" 
                    placeholder="Jon Doe"
                ><br><br>

                <label for="email">Email : </label>
                <input type="text" 
                    id="email_input" 
                    name="email" 
                    placeholder="Jon@gmail.com"
                ><br><br>
                
                <label for="phone">Phone : </label>
                <input type="text" 
                    id="phone_input" 
                    name="phone" 
                    placeholder="05412345678"
                ><br><br>

            </fieldset>
            <fieldset class="message-container">
                <legend>Message Details</legend>

                <label for="subjects">Subject: </label>
                <select>
                    <option value="sales">Sales</option>
                    <option value="career">Career</option>
                    <option value="donate">Donate</option>
                </select><br>
                
                
                <p>Priority: </p>
                <input type="radio" name="low" value="low">
                <label for="low">Low</label>

                <input type="radio" name="medium" value="medium">
                <label for="medium">Medium</label>

                <input id="high_radio" type="radio" name="high" value="high">
                <label for="high_radio">High</label>

                
                <label for="msg_box">Message</label><br>
                <textarea 
                    id="msg_box"
                    name="msg_box"
                    rows="5"
                    cols="45"
                    placeholder="Your message..."
                ></textarea>

            </fieldset>
            <fieldset class="preference-cointainer">
                <legend>Preference</legend>
                <input type="checkbox" name="subscribe">
                <label for="subscribe">Subscribe to newsletter</label><br>

                <label for="contact_Method">Contact Method: </label>
                <select name="contact_Method">
                    <option value="sales">Email</option>
                    <option value="career">Fax</option>
                </select><br>
            </fieldset><br>
            <button id="btnSendMessage" type="button">Send Message</button>
            <button id="btnReset" type="button">Reset</button>

        </form>
    </div>
    
</body>
</html>
